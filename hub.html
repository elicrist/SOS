<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOS</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SOS">
<meta name="theme-color" content="#0e0e0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/sos_final_180.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* Enables the browser's native cross-fade between same-origin page
   navigations (hub<->page<->gt/mission/index) — no JS needed. Degrades
   to today's instant snap on browsers without support (e.g. Firefox).
   Doesn't affect in-page interactions (tab switches, widget adds, etc.)
   since those never trigger a real navigation. */
@view-transition { navigation: auto; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0f;--surface:#161618;--card:#1c1c1f;--border:#2a2a2e;--border-light:#333338;
  --text:#f0ede8;--muted:#888880;--faint:#2a2a2e;
  --accent:#B3A369;--danger:#e05b5b;
  --summer:#e07b4a;--summer-bg:#2e1a0e;
  /* App-wide theme accent, set from the user's Appearance choice (page.html
     Settings) — see the flash-prevention script right after this style
     block. Fallback here is only what shows before that script runs. */
  --accent-default:#B3A369;
}
[data-theme="light"]{
  --bg:#f4f4f2;--surface:#ffffff;--card:#ffffff;--border:#e2e0da;--border-light:#d3d0c8;
  --text:#1a1a18;--muted:#6b6a63;--faint:#ece9e2;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}
header{padding:1.1rem 2rem;border-bottom:1px solid var(--border);box-shadow:0 1px 12px -2px color-mix(in srgb,var(--accent-default) 35%,transparent);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-size:17px;font-weight:600;letter-spacing:-.4px}
.logo span{color:var(--muted);font-weight:300}
.hdr-meta{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 2rem;gap:2.5rem}
.hub-greeting{text-align:center}
.greeting-title{font-size:20px;font-weight:600;letter-spacing:-.3px;margin-bottom:.3rem}
.greeting-tagline{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
.eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-family:'DM Mono',monospace}
.os-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.25rem;width:100%;max-width:920px}
/* Default border reads --card-border (a dynamic card's own translucent tint,
   set as a custom property, not a direct border-color) rather than having
   dynamic cards set border-color inline — an inline border-color would beat
   the :hover rule below no matter how it's written, since inline style
   always outranks any stylesheet selector regardless of specificity. */
/* Resting box-shadow is the NEW app-wide accent glow (uniform across every
   card, always on) — deliberately separate from :hover below, which keeps
   using each card's own --card-accent (per-page color). Adding both here
   would fight each other; :hover wins on its own since it's declared after
   this rule, so a hovered card's shadow fully replaces the resting one
   rather than the two adding together. */
.os-card{background:var(--card);border:1px solid var(--card-border,var(--border));border-radius:14px;padding:2rem 1.75rem;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:all .2s;min-width:0;box-shadow:0 0 20px -4px color-mix(in srgb,var(--accent-default) 45%,transparent)}
/* --card-accent is set per card (from its own dot/accent color) so hover
   always matches THAT page's color — never a fixed app-wide one. Every
   card left today is dynamic and sets this inline; .s below is the one
   remaining pre-multi-tenancy holdover (Summer), out of scope here. */
.os-card:hover{transform:translateY(-3px);border-color:var(--card-accent,var(--border-light));box-shadow:0 8px 36px color-mix(in srgb,var(--card-accent,transparent) 20%,transparent)}
.os-phase{font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-family:'DM Mono',monospace;margin-bottom:.6rem;display:flex;align-items:center;gap:6px}
.s .os-phase{color:var(--summer)}
.pulse{width:6px;height:6px;border-radius:50%;flex-shrink:0;animation:pulse 2s ease-in-out infinite}
.s .pulse{background:var(--summer)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.os-name{font-size:22px;font-weight:600;letter-spacing:-.4px;margin-bottom:.4rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.os-tags{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;line-height:1.8}
.os-cd{margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border)}
.cd-num{font-size:32px;font-weight:600;letter-spacing:-.6px;line-height:1;color:var(--card-accent,var(--text))}
.s .cd-num{color:var(--summer)}
.cd-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:5px}
.cd-prompt{font-size:11px;color:var(--muted);line-height:1.5}
.os-open{margin-top:1.5rem;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);transition:color .15s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.os-card:hover .os-open{color:var(--text)}
.hub-empty{display:flex;flex-direction:column;align-items:center;gap:1rem;padding:3rem 2rem;cursor:pointer;border:1px dashed var(--border-light);border-radius:14px;background:none;color:inherit;font-family:inherit;transition:all .2s;width:100%;max-width:420px;justify-self:center}
.hub-empty:hover{border-color:var(--text);background:var(--card)}
.hub-empty-plus{font-size:48px;font-weight:300;color:var(--muted);line-height:1;transition:color .2s}
.hub-empty:hover .hub-empty-plus{color:var(--text)}
.hub-empty-text{font-size:13px;color:var(--muted)}
footer{padding:1rem 2rem;border-top:1px solid var(--border);font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;text-align:center}
/* Minimal subset of page.html's overlay/field/button pattern (see
   ecos-sidebar-pattern) — reused here instead of native prompt()/alert(),
   which looked out of place and were called out directly. */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.58);display:none;align-items:center;justify-content:center;padding:20px;z-index:1000;overscroll-behavior:contain}
.overlay.active{display:flex}
.overlay-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.5rem;max-width:420px;width:100%;box-shadow:0 25px 60px rgba(0,0,0,.35)}
.section-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:500;margin-bottom:.9rem}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
input{background:var(--surface);border:1px solid var(--border-light);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:7px 10px;border-radius:7px;outline:none;width:100%}
.btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border-light);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:color-mix(in srgb,var(--accent) 14%,var(--card));border-color:var(--accent);color:var(--accent);box-shadow:0 0 16px -3px color-mix(in srgb,var(--accent) 45%,transparent)}
.fp-error{color:var(--danger);font-size:12px;margin-top:8px;display:none}
@media(max-width:700px){.os-grid{grid-template-columns:1fr}main{justify-content:flex-start;padding-top:2rem}}
</style>
<script>
// Applied synchronously before first paint to avoid a flash of the wrong
// theme. Duplicated verbatim from page.html (same no-shared-module pattern
// as everything else here) — see that file's copy for the fuller
// explanation and the Appearance settings UI that writes these same
// localStorage keys. hub.html has no per-page accent concept (it's a page
// LISTING, not an individual page view), so unlike page.html it sets both
// --accent and --accent-default to the same theme value rather than
// keeping them distinct.
(function(){
  var mode=localStorage.getItem('theme_mode')||'dark';
  var visual=mode;
  if(mode==='auto'){
    var now=new Date();
    var dt=(localStorage.getItem('theme_dark_time')||'20:00').split(':').map(Number);
    var lt=(localStorage.getItem('theme_light_time')||'07:00').split(':').map(Number);
    var nowMin=now.getHours()*60+now.getMinutes();
    var darkMin=dt[0]*60+dt[1],lightMin=lt[0]*60+lt[1];
    visual=darkMin>lightMin?(nowMin>=darkMin||nowMin<lightMin?'dark':'light'):(nowMin>=darkMin&&nowMin<lightMin?'dark':'light');
  }
  document.documentElement.setAttribute('data-theme',visual);
  var accent=localStorage.getItem('theme_accent')||'#B3A369';
  document.documentElement.style.setProperty('--accent',accent);
  document.documentElement.style.setProperty('--accent-default',accent);
})();
</script>
</head>
<body>
<header>
  <div class="logo">SOS <span id="hdr-owner"></span></div>
  <div class="hdr-meta" id="hdr-date"></div>
</header>
<main>
  <div class="hub-greeting">
    <div class="greeting-title" id="greeting-title"></div>
    <div class="greeting-tagline" id="greeting-tagline"></div>
  </div>
  <div class="eyebrow">select your operating system</div>
  <div class="os-grid" id="os-grid"></div>
</main>
<div id="first-page-overlay" class="overlay" aria-hidden="true" onclick="closeOverlayIfBackdrop(event,closeFirstPageModal)">
  <div class="overlay-card">
    <div class="section-title" style="margin-bottom:1rem">Build your first page</div>
    <div class="field">
      <label>Page name</label>
      <input type="text" id="fp-name" placeholder="e.g. Summer, Habits, Side Project" onkeydown="if(event.key==='Enter'){submitFirstPage();}else if(event.key==='Escape'){closeFirstPageModal();}">
    </div>
    <div class="fp-error" id="fp-error"></div>
    <div style="display:flex;gap:8px;margin-top:1.25rem">
      <button class="btn" style="flex:1" onclick="closeFirstPageModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" id="fp-create-btn" onclick="submitFirstPage()">Create page</button>
    </div>
  </div>
</div>
<footer>sos · built summer 2026</footer>
<script src="public/auth.js"></script>
<script>
const today=new Date();today.setHours(0,0,0,0);
document.getElementById('hdr-date').textContent=today.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});

// Re-applies the auto-mode day/night switch against the LIVE local clock
// every 30s, so a hub tab left open through the switch time actually
// flips without needing a reload — cheap no-op in light/dark modes. See
// the flash-prevention script above (and page.html's Appearance settings,
// the only place these localStorage keys get written) for the full story.
setInterval(()=>{
  if((localStorage.getItem('theme_mode')||'dark')!=='auto')return;
  const now=new Date();
  const dt=(localStorage.getItem('theme_dark_time')||'20:00').split(':').map(Number);
  const lt=(localStorage.getItem('theme_light_time')||'07:00').split(':').map(Number);
  const nowMin=now.getHours()*60+now.getMinutes();
  const darkMin=dt[0]*60+dt[1],lightMin=lt[0]*60+lt[1];
  const visual=darkMin>lightMin?(nowMin>=darkMin||nowMin<lightMin?'dark':'light'):(nowMin>=darkMin&&nowMin<lightMin?'dark':'light');
  document.documentElement.setAttribute('data-theme',visual);
},30000);

// Derived from the actual signed-in session, never a hardcoded name — this
// used to say a specific person's name unconditionally, which leaked to
// every other account (caught live on a genuinely empty second account).
// authSession is populated synchronously from localStorage by public/auth.js
// before this script runs, so no need to wait on the async initAuth() below.
document.getElementById('hdr-owner').textContent=authSession?.user?.email?`/ ${authSession.user.email.split('@')[0]}`:'';

// Single source for the hub greeting text — no real nickname/profile storage
// exists yet (that's a future onboarding phase), so this is a generic
// placeholder for now. When a real nickname exists, only this function's
// body needs to change (e.g. reading authSession.user.nickname) — nothing
// else references the greeting text directly.
const getGreeting=()=>({title:'Welcome back',tagline:'Your operating systems, all in one place.'});
const greeting=getGreeting();
document.getElementById('greeting-title').textContent=greeting.title;
document.getElementById('greeting-tagline').textContent=greeting.tagline;

// hub.html sources its page list from ec_pages — same source of truth the
// sidebar on every other surface uses — rather than a hardcoded list.
const sbFetchJson=async(url)=>{
  const resp=await fetch(url,{headers:buildHeaders()});
  if(!resp.ok) throw new Error(`Fetch failed ${resp.status}`);
  return resp.json();
};

// Minimal duplicates of page.html's stat-calculation helpers — hub.html is a
// separate static file with no shared JS module between them, so these are
// copied rather than imported. Kept intentionally small: only
// what's needed to derive a single headline {value,label} pair per widget
// type, not the full rich Dashboard-tab summary rendering.
function hubTodayStr(){return new Date().toLocaleDateString('en-CA',{timeZone:'America/New_York'});}
function hubSchedWeekdayIdx(d=new Date()){const j=d.getDay();return j===0?6:j-1;}
function hubCalcHabitStreak(log){
  let streak=0;
  for(let i=0;i<365;i++){
    const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-i);
    const dk=d.toLocaleDateString('en-CA');
    if(log[dk])streak++;
    else if(i>0)break;
  }
  return streak;
}
function hubSavingsBalance(start,entries){
  let b=start;
  entries.forEach(e=>{
    const amt=Number(e.amount)||0;
    if(e.type==='balance')b=amt;
    else if(e.type==='expense')b-=amt;
    else b+=amt;
  });
  return b;
}
// One headline {value,label} extractor per widget type — mirrors the shape
// (not the full richness) of page.html's WIDGET_SUMMARY_RENDERERS. Returning
// null means "nothing meaningful to show yet" (e.g. no entries logged),
// which falls back to the same "star a stat" prompt as no widget being
// starred at all.
const HUB_STAT_EXTRACTORS={
  savings:(cfg,data)=>{
    const start=Number(cfg.start)||0,goal=Number(cfg.goal)||0;
    const current=hubSavingsBalance(start,data?.entries||[]);
    return {value:`$${current.toFixed(2)}`,label:`of $${goal.toFixed(2)} goal`};
  },
  checklist:(cfg,data)=>{
    const items=data?.items||[];
    if(!items.length)return null;
    const done=items.filter(i=>i.done).length;
    return {value:`${done} / ${items.length}`,label:'items done'};
  },
  habits:(cfg,data)=>{
    const log=data?.log||{};
    const done=!!log[hubTodayStr()];
    const streak=hubCalcHabitStreak(log);
    return {value:streak>0?streak:(done?'✓':'—'),label:streak>0?'day streak':(done?'done today':'not done today')};
  },
  notes:(cfg,data)=>{
    const entries=data?.entries||[];
    if(!entries.length)return null;
    return {value:entries.length,label:entries.length===1?'note':'notes'};
  },
  schedule:(cfg,data)=>{
    const template=cfg.template||{};
    const events=data?.events||[];
    const dayBlocks=template[String(hubSchedWeekdayIdx())]?.blocks||[];
    const today=hubTodayStr();
    const dayEvents=events.filter(e=>e.date===today);
    const count=dayBlocks.length+dayEvents.length;
    if(!count)return null;
    return {value:count,label:count===1?'item today':'items today'};
  },
  countdown:cfg=>{
    if(!cfg.target_date)return null;
    const target=new Date(cfg.target_date+'T00:00:00');
    const now=new Date();now.setHours(0,0,0,0);
    const d=Math.ceil((target-now)/86400000);
    return {value:d>0?d:(d===0?'Today':'Past'),label:cfg.label||cfg.target_date};
  },
  funded_checklist:(cfg,data)=>{
    const target=Number(cfg.target_count)||0;
    const done=(data?.items||[]).filter(i=>i.done).length;
    return {value:`${done} / ${target}`,label:cfg.label||'funded goal'};
  },
  workout_log:cfg=>{
    const day=cfg.program?.days?.[String(hubSchedWeekdayIdx())];
    const count=(day?.exercises||[]).length;
    if(!count)return {value:'—',label:'rest day'};
    return {value:count,label:'exercises today'};
  },
  golf_log:(cfg,data)=>{
    const entries=data?.entries||[];
    if(!entries.length)return null;
    return {value:entries.length,label:entries.length===1?'round logged':'rounds logged'};
  },
  tennis_log:(cfg,data)=>{
    const entries=data?.entries||[];
    if(!entries.length)return null;
    const matches=entries.filter(e=>e.type==='match');
    const wins=matches.filter(e=>e.result==='W').length;
    return {value:`${wins}-${matches.length-wins}`,label:'match record'};
  },
};
const HUB_STAT_PROMPT_NONE='<div class="os-cd"><div class="cd-prompt">Star a dashboard stat to feature it here</div></div>';
const HUB_STAT_PROMPT_EMPTY='<div class="os-cd"><div class="cd-prompt">No data logged yet</div></div>';
// Two distinct empty states, not one: nothing favorited at all vs. a widget
// IS favorited but genuinely has no data yet (e.g. a freshly-starred notes
// or checklist widget with zero entries) are different situations and
// shouldn't both read as "go star something" — the second one is already
// wired up correctly and just needs its first log entry.
const hubCardStatBlock=(widget,data)=>{
  if(!widget)return HUB_STAT_PROMPT_NONE;
  const extractor=HUB_STAT_EXTRACTORS[widget.widget_type];
  const stat=extractor?extractor(widget.config||{},data):null;
  if(!stat)return HUB_STAT_PROMPT_EMPTY;
  return `<div class="os-cd"><div class="cd-num">${stat.value}</div><div class="cd-label">${stat.label}</div></div>`;
};
// Fetches whichever widget is hub-starred (config.hubStarred===true — see
// page.html's toggleHubStar) for a single dynamic page, plus that widget's
// current data. Static-kind pages (GT/Mission/index) don't have real
// ec_page_widgets rows — their countdown stays the existing hardcoded one.
const fetchHubStat=async pageRow=>{
  if(pageRow.page_kind==='static')return {widget:null,data:null};
  try{
    const widgets=await sbFetchJson(`${SB_URL}/rest/v1/ec_page_widgets?page_id=eq.${pageRow.id}&select=*`);
    const starred=widgets.find(w=>w.config?.hubStarred);
    if(!starred)return {widget:null,data:null};
    const dataRows=await sbFetchJson(`${SB_URL}/rest/v1/ec_widget_data?page_widget_id=eq.${starred.id}&select=data`);
    return {widget:starred,data:dataRows[0]?.data||{}};
  }catch(e){
    console.error('fetchHubStat failed for page',pageRow.id,e);
    return {widget:null,data:null};
  }
};

// Click-outside-to-close, same pattern as page.html's overlays.
const closeOverlayIfBackdrop=(event,closeFn)=>{ if(event.target===event.currentTarget) closeFn(); };

// Lightweight page creation for the empty-state CTA — asks only for a name
// (mirrors the sidebar's own addTab-style quick-prompt pattern) rather than
// duplicating page.html's full 2-step builder overlay into this file. Once
// this first page exists, its own sidebar "+ New page" covers the rest.
// dot_color is required — every other ec_pages insert in this codebase
// (page.html's buildPage, migrate.html) always sets it, and this was the
// one call site that didn't, which is why "Build your
// first page" failed outright on a real empty account (confirmed by
// comparing this against every other working insert; ec_pages.dot_color
// has no default, so leaving it out fails the insert before it ever reaches
// RLS). #B3A369 matches the first swatch in page.html's own PB_COLORS
// palette, i.e. the same default a fresh page.html builder session would use.
const FIRST_PAGE_DEFAULT_COLOR='#B3A369';
const openFirstPageModal=()=>{
  const overlay=document.getElementById('first-page-overlay');
  if(!overlay)return;
  document.getElementById('fp-name').value='';
  document.getElementById('fp-error').style.display='none';
  overlay.classList.add('active');
  overlay.setAttribute('aria-hidden','false');
  document.getElementById('fp-name').focus();
};
const closeFirstPageModal=()=>{
  const overlay=document.getElementById('first-page-overlay');
  if(!overlay)return;
  overlay.classList.remove('active');
  overlay.setAttribute('aria-hidden','true');
};
const submitFirstPage=async()=>{
  const input=document.getElementById('fp-name');
  const trimmed=input.value.trim();
  if(!trimmed){
    const err=document.getElementById('fp-error');
    err.textContent='Page name is required.';
    err.style.display='block';
    return;
  }
  const btn=document.getElementById('fp-create-btn');
  btn.disabled=true;btn.textContent='Creating…';
  try{
    const pageId=Date.now();
    const resp=await fetch(`${SB_URL}/rest/v1/ec_pages`,{method:'POST',headers:buildHeaders(),body:JSON.stringify({id:pageId,name:trimmed,dot_color:FIRST_PAGE_DEFAULT_COLOR,sort_order:0,archived:false})});
    if(!resp.ok) throw new Error(`Page insert failed ${resp.status}`);
    window.location.href=`page.html?id=${pageId}`;
  }catch(e){
    console.error('submitFirstPage failed',e);
    const err=document.getElementById('fp-error');
    err.textContent='Failed to create page — try again.';
    err.style.display='block';
    btn.disabled=false;btn.textContent='Create page';
  }
};

// index.html has no card/DOM id of its own anymore (it's just the login
// gate) but stays mapped here so its stale ec_pages static row — if it still
// exists — gets treated as "already accounted for" and filtered out of the
// dynamic list below, instead of leaking through as a broken generic card.
// gt.html/mission.html used to be here too — retired in Phase 6, rebuilt as
// ordinary dynamic Pages with no page_kind==='static' row ever created for
// them, so there's no stale row for this map to guard against anymore.
const KNOWN_STATIC_CARDS={'index.html':'os-card-summer'};
(async()=>{
  const authed=await initAuth();
  if(!authed) return; // anon RLS sees nothing
  try{
    const rows=await sbFetchJson(`${SB_URL}/rest/v1/ec_pages?archived=eq.false&select=*&order=sort_order.asc`);
    const extra=[];
    rows.forEach(r=>{
      const knownId=r.page_kind==='static'?KNOWN_STATIC_CARDS[String(r.url||'').split('/').pop()]:null;
      if(knownId) return; // a hand-built card — already shown, just confirmed active
      extra.push(r);
    });
    // Hide any known static card whose own row is archived (not in the active set).
    Object.entries(KNOWN_STATIC_CARDS).forEach(([url,domId])=>{
      const stillActive=rows.some(r=>r.page_kind==='static'&&String(r.url||'').split('/').pop()===url);
      const el=document.getElementById(domId);
      if(el&&!stillActive) el.style.display='none';
    });
    if(extra.length){
      const grid=document.getElementById('os-grid');
      const stats=await Promise.all(extra.map(fetchHubStat));
      grid.insertAdjacentHTML('beforeend',extra.map((r,i)=>{
        const href=r.page_kind==='static'?r.url:`page.html?id=${r.id}`;
        const caption=[r.timeframe,r.location].filter(Boolean).join(' · ')||(r.page_kind==='static'?'page':'custom page');
        const color=r.dot_color||'var(--muted)';
        const safeName=String(r.name).replace(/"/g,'&quot;');
        return `<a class="os-card" href="${href}" style="--card-border:${color}22;--card-accent:${color}">
          <div class="os-phase" style="color:${color}"><span class="pulse" style="background:${color}"></span>${caption}</div>
          <div class="os-name" title="${safeName}">${safeName}</div>
          ${hubCardStatBlock(stats[i].widget,stats[i].data)}
          <div class="os-open">→ open ${safeName}</div>
        </a>`;
      }).join(''));
    }
    // A brand-new account has no known static row either, so the one
    // hardcoded card above just got hidden and extra is empty — the grid
    // would otherwise be silently blank instead of inviting first use.
    const visibleCards=[...document.querySelectorAll('#os-grid .os-card')].filter(el=>el.style.display!=='none');
    if(!visibleCards.length){
      document.getElementById('os-grid').innerHTML=`
        <button class="hub-empty" onclick="openFirstPageModal()" aria-label="Build your first page">
          <div class="hub-empty-plus">+</div>
          <div class="hub-empty-text">Build your first page to get started</div>
        </button>`;
    }
  }catch(e){
    console.error('hub page list failed',e);
  }
})();
</script>
</body>
</html>
